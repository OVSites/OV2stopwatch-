<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OneVision Timer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="timer-card">
        <div class="timer-title">
            <i class="fas fa-door-closed"></i>
            <span>Время с закрытия OneVision</span>
        </div>
        <div id="timerDisplay"></div>
        <div class="timer-sub">OneVision закрылся 21 ноября 2025 года в 00:45</div>
    </div>

    <div class="auth-panel">
        <div class="auth-group">
            <input type="text" id="regLogin" placeholder="Логин" class="auth-input">
            <input type="password" id="regPass" placeholder="Пароль" class="auth-input">
            <button id="registerBtn" class="btn btn-primary">Регистрация</button>
            <button id="loginBtn" class="btn btn-info">Вход</button>
        </div>
        <div class="user-badge">
            <i class="fas fa-user"></i>
            <span id="currentUserSpan">Гость</span>
            <button id="logoutBtn" class="btn-danger btn">Выйти</button>
        </div>
    </div>

    <div class="chat-box">
        <div class="messages-window" id="messagesWindow"></div>
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="Сообщение..." disabled>
            <button id="sendMsgBtn" class="btn btn-primary" disabled>Отправить</button>
            <button id="openGifBtn" class="btn btn-warning" disabled>🎬 GIF</button>
        </div>
        <div id="giphyPanel" class="gif-panel">
            <input type="text" id="gifSearch" placeholder="Поиск GIF...">
            <div id="gifList"></div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
